spring.application.name=vinos_api
application.title=Proyecto de Venta de Vinos
application.description=API para gestionar la venta de vinos en linea
application.version=1.0.0

# Configuraciµn del servidor
server.port=${SERVER_PORT}

# ===== Configuraciµn de la base de datos MySQL =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== Configuraciµn de Spring Boot =====
spring.main.allow-bean-definition-overriding=true
spring.sql.init.mode=never

# ===== Devtools =====
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ===== Logging =====
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE

# ===== JWT Configuration =====
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

logging.level.org.springframework.security=ERROR
logging.level.io.jsonwebtoken=ERROR

# application.properties
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
fotosUsuarios.url=http://26.118.48.22:8080
