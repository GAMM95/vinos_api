spring.application.name=vinos_api
application.title=Proyecto de Venta de Vinos
application.description=API para gestionar la venta de vinos en linea
application.version=1.0.0

# Configuracion del servidor
server.port=8080

# ===== Configuración de la base de datos MySQL =====
spring.datasource.url=jdbc:mysql://26.6.140.243:3306/vinos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=GammServer
spring.datasource.password=abc123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== Configuración de Spring Boot =====
